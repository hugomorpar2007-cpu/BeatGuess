<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BeatGuess</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">BeatGuess</div>
    <div>🔍 👤</div>
  </div>

  <div class="hero">
    <p class="tag">LO NUEVO</p>
    <h1>DOMINA EL <span>RITMO.</span></h1>
    <p class="subtitle">Prueba tu oído con miles de temas</p>
    <button>A jugar</button>
  </div>

  <div class="section-title">Elige estilo</div>
  <div class="styles">
    <div class="card">
      <h3>Pop</h3>
      <p>Lo más sonado</p>
    </div>
    <div class="card">
      <h3>Rock</h3>
      <p>Pura leyenda</p>
    </div>
    <div class="card">
      <h3>Hip-Hop</h3>
      <p>Flow y beats</p>
    </div>
    <div class="card">
      <h3>Electrónica</h3>
      <p>Sintes y bajos</p>
    </div>
  </div>

  <div class="bottom">
    <div class="featured">
      <p class="badge">A TOPE</p>
      <h2>Flashback 90s Synth-Pop</h2>
      <p class="subtitle">Dale caña a 10 temazos del pop electrónico</p>
    </div>

    <div class="ranking">
      <p>TU PUESTO</p>
      <h1>#128</h1>
      <p>Entre los mejores</p>
      <button>Ver ranking</button>
    </div>
  </div>

</body>
<script src="script.js"></script>
</html>
